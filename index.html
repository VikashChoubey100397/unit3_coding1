<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html{
        font-size: 62.5%;
    }
    #container{
        width: 95%;
        height: 90vh;
        margin: auto;
        display: grid;
        grid-template-columns: 25% 75%;
        background-color: teal;

    }
    #container>div{
        border: 5px solid black;
    }
    .addProduct{
        background-color: palevioletred;
    }
    h1{
        font-size: 5rem;
        text-align: center;
        text-transform: capitalize;
        text-shadow: 1px 0.3rem 0.3rem 0.3rem black;
        margin-bottom: 20rem;
    }
    form{
        width: fit-content;
        height: fit-content;
        margin: auto;
        padding: 2rem;
    }
    
     input{
         display: block;
         font-size: 3rem;
         border: 0.5rem solid black;
         padding: 1rem;
         margin: 2rem;
     }





    </style>
</head>
<body>
    <div id="container">
        <div class="addProduct">
            <h1>Add Products</h1>
            <div class="form">
                <form>
                 <input type="text" id="id_no" placeholder="Enter the id_no">
                 <input type="text" id="name" placeholder="Enter the name of the Product">
                 <input type="number" id="price" placeholder="Enter the price of the Product">
                 <input type="text" id="currency" placeholder="Enter the currency">
                 <input type="number" id="available_qty" placeholder="Enter the available_qty">
                </form>
            </div>
        </div>
    <div class="showProduct">


    </div>
    </div>
</body>
</html>
